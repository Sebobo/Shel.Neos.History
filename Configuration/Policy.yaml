privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':
    'Shel.Neos.History:BackendModule':
      matcher: 'within(Shel\Neos\History\Controller\HistoryController) && method(public .*->(?!initialize).*Action())'

roles:
  'Neos.Neos:Administrator':
    privileges:
      -
        privilegeTarget: 'Shel.Neos.History:BackendModule'
        permission: GRANT
